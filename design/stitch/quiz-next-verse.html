<!doctype html>

<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Quran-Guessr - Next Verse Quiz</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'on-primary': '#003739',
              'surface-dim': '#101415',
              'tertiary-container': '#8a95ab',
              'on-background': '#e0e3e5',
              background: '#101415',
              'surface-container-high': '#272a2c',
              tertiary: '#bcc7de',
              primary: '#6ad7de',
              'surface-variant': '#323537',
              'surface-container-highest': '#323537',
              secondary: '#b7c8e1',
              'inverse-surface': '#e0e3e5',
              'inverse-primary': '#00696e',
              'outline-variant': '#3d494a',
              'on-surface-variant': '#bcc9c9',
              'primary-fixed-dim': '#6ad7de',
              'on-tertiary-fixed': '#111c2d',
              'error-container': '#93000a',
              'on-error-container': '#ffdad6',
              'surface-container-low': '#191c1e',
              'on-secondary-fixed': '#0b1c30',
              outline: '#879394',
              'primary-fixed': '#88f3fa',
              'primary-container': '#2ca4ab',
              'tertiary-fixed-dim': '#bcc7de',
              surface: '#101415',
              'secondary-fixed-dim': '#b7c8e1',
              'on-secondary-fixed-variant': '#38485d',
              'on-primary-fixed-variant': '#004f53',
              'on-primary-fixed': '#002022',
              'tertiary-fixed': '#d8e3fb',
              'surface-bright': '#363a3b',
              'on-secondary-container': '#a9bad3',
              error: '#ffb4ab',
              'surface-tint': '#6ad7de',
              'on-tertiary': '#263143',
              'surface-container-lowest': '#0b0f10',
              'on-error': '#690005',
              'inverse-on-surface': '#2d3133',
              'secondary-fixed': '#d3e4fe',
              'on-secondary': '#213145',
              'on-primary-container': '#003436',
              'on-surface': '#e0e3e5',
              'secondary-container': '#3a4a5f',
              'surface-container': '#1d2022',
              'on-tertiary-fixed-variant': '#3c475a',
              'on-tertiary-container': '#232e40',
            },
            borderRadius: {
              DEFAULT: '0.25rem',
              lg: '0.5rem',
              xl: '0.75rem',
              full: '9999px',
            },
            spacing: {
              margin: '20px',
              lg: '24px',
              xl: '32px',
              md: '16px',
              gutter: '16px',
              xs: '4px',
              unit: '4px',
              sm: '8px',
            },
            fontFamily: {
              'headline-lg': ['Inter'],
              'headline-md': ['Inter'],
              'body-lg': ['Inter'],
              'label-md': ['Inter'],
              'body-md': ['Inter'],
              'arabic-display': ['Inter'],
            },
            fontSize: {
              'headline-lg': [
                '32px',
                { lineHeight: '40px', letterSpacing: '-0.02em', fontWeight: '700' },
              ],
              'headline-md': [
                '24px',
                { lineHeight: '32px', letterSpacing: '-0.01em', fontWeight: '600' },
              ],
              'body-lg': ['18px', { lineHeight: '28px', fontWeight: '400' }],
              'label-md': [
                '14px',
                { lineHeight: '20px', letterSpacing: '0.01em', fontWeight: '500' },
              ],
              'body-md': ['16px', { lineHeight: '24px', fontWeight: '400' }],
              'arabic-display': ['40px', { lineHeight: '60px', fontWeight: '500' }],
            },
          },
        },
      };
    </script>
  </head>
  <body
    class="bg-background text-on-background font-body-md min-h-screen flex flex-col antialiased"
  >
    <!-- TopNavBar (Shared Component) -->
    <nav
      class="hidden md:flex bg-[#0F172A] dark:bg-slate-950/80 backdrop-blur-md docked full-width top-0 z-50 border-b border-slate-800 flat no shadows justify-between items-center w-full px-6 py-4 max-w-7xl mx-auto"
    >
      <div class="flex items-center gap-xl">
        <div class="text-xl font-bold text-[#2CA4AB] tracking-tight">Quran-Guessr</div>
        <div class="flex gap-lg">
          <a
            class="font-inter text-sm font-medium tracking-tight text-slate-400 hover:text-slate-200 hover:text-[#2CA4AB] transition-colors duration-200"
            href="#"
            >Home</a
          >
          <a
            class="font-inter text-sm font-medium tracking-tight text-[#2CA4AB] border-b-2 border-[#2CA4AB] pb-1 hover:text-[#2CA4AB] transition-colors duration-200"
            href="#"
            >Quiz</a
          >
          <a
            class="font-inter text-sm font-medium tracking-tight text-slate-400 hover:text-slate-200 hover:text-[#2CA4AB] transition-colors duration-200"
            href="#"
            >Leaderboard</a
          >
        </div>
      </div>
      <div class="flex items-center">
        <button class="text-[#2CA4AB] hover:opacity-80 scale-95 transition-all">
          <span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
        </button>
      </div>
    </nav>
    <!-- Main Content Canvas -->
    <main
      class="flex-grow flex flex-col items-center w-full max-w-4xl mx-auto px-margin py-xl md:py-16"
    >
      <!-- Progress & Header Area -->
      <div class="w-full flex flex-col gap-sm mb-xl">
        <div class="flex justify-between items-end w-full">
          <div>
            <h2 class="font-label-md text-on-surface-variant uppercase tracking-wider">
              Al-Baqarah
            </h2>
            <p class="font-body-md text-on-background">Question 6 of 10</p>
          </div>
          <div
            class="bg-surface-container-high rounded-full px-sm py-xs border border-outline-variant flex items-center gap-xs"
          >
            <span
              class="material-symbols-outlined text-primary-container text-sm"
              data-icon="monitoring"
              >monitoring</span
            >
            <span class="font-label-md text-primary-container">88% Mastery</span>
          </div>
        </div>
        <!-- Progress Bar -->
        <div class="w-full h-1 bg-surface-container-high rounded-full overflow-hidden">
          <div
            class="h-full bg-primary-container w-[60%] rounded-full shadow-[0_0_8px_rgba(44,164,171,0.5)]"
          ></div>
        </div>
      </div>
      <!-- The Verse Card (Centerpiece) -->
      <div
        class="w-full bg-[#1E293B] rounded-xl p-xl shadow-[0_4px_24px_rgba(0,0,0,0.2)] border border-slate-800/50 flex flex-col items-center justify-center min-h-[240px] mb-xl relative overflow-hidden group"
      >
        <!-- Subtle backdrop glow -->
        <div
          class="absolute inset-0 bg-primary-container/5 opacity-50 blur-xl pointer-events-none"
        ></div>
        <div class="text-center z-10 w-full" dir="rtl">
          <p
            class="font-arabic-display text-on-background leading-[1.8] text-[36px] md:text-[48px] font-medium"
            style="font-family: 'Amiri', 'Inter', serif"
          >
            ذَٰلِكَ الْكِتَابُ لَا رَيْبَ ۛ فِيهِ ۛ هُدًى لِّلْمُتَّقِينَ
          </p>
        </div>
      </div>
      <!-- Question Prompt -->
      <div class="text-center mb-lg">
        <h3 class="font-headline-md text-on-background">What is the next Ayah?</h3>
        <p class="font-body-md text-on-surface-variant mt-xs">Select the correct continuation.</p>
      </div>
      <!-- Choices Grid -->
      <div class="w-full grid grid-cols-1 md:grid-cols-2 gap-md">
        <!-- Option A (Incorrect/Normal State) -->
        <button
          class="w-full bg-[#1E293B] hover:bg-[#273447] border-2 border-transparent hover:border-slate-600 rounded-xl p-md text-right transition-all duration-200 flex flex-col justify-center min-h-[100px] group"
        >
          <p
            class="font-arabic-display text-on-background text-[24px] md:text-[28px] w-full"
            dir="rtl"
            style="font-family: 'Amiri', 'Inter', serif"
          >
            وَالَّذِينَ يُؤْمِنُونَ بِمَا أُنزِلَ إِلَيْكَ
          </p>
        </button>
        <!-- Option B (Hover/Focus State simulation) -->
        <button
          class="w-full bg-[#1E293B] hover:bg-primary-container/10 border-2 border-slate-700 hover:border-primary-container rounded-xl p-md text-right transition-all duration-200 flex flex-col justify-center min-h-[100px] relative overflow-hidden"
        >
          <p
            class="font-arabic-display text-on-background text-[24px] md:text-[28px] w-full"
            dir="rtl"
            style="font-family: 'Amiri', 'Inter', serif"
          >
            الَّذِينَ يُؤْمِنُونَ بِالْغَيْبِ وَيُقِيمُونَ الصَّلَاةَ
          </p>
        </button>
        <!-- Option C -->
        <button
          class="w-full bg-[#1E293B] hover:bg-[#273447] border-2 border-transparent hover:border-slate-600 rounded-xl p-md text-right transition-all duration-200 flex flex-col justify-center min-h-[100px]"
        >
          <p
            class="font-arabic-display text-on-background text-[24px] md:text-[28px] w-full"
            dir="rtl"
            style="font-family: 'Amiri', 'Inter', serif"
          >
            أُولَٰئِكَ عَلَىٰ هُدًى مِّن رَّبِّهِمْ
          </p>
        </button>
        <!-- Option D -->
        <button
          class="w-full bg-[#1E293B] hover:bg-[#273447] border-2 border-transparent hover:border-slate-600 rounded-xl p-md text-right transition-all duration-200 flex flex-col justify-center min-h-[100px]"
        >
          <p
            class="font-arabic-display text-on-background text-[24px] md:text-[28px] w-full"
            dir="rtl"
            style="font-family: 'Amiri', 'Inter', serif"
          >
            خَتَمَ اللَّهُ عَلَىٰ قُلُوبِهِمْ وَعَلَىٰ سَمْعِهِمْ
          </p>
        </button>
      </div>
    </main>
    <!-- BottomNavBar (Shared Component - Mobile Only) -->
    <nav
      class="md:hidden bg-[#1E293B] dark:bg-slate-900/90 backdrop-blur-xl fixed bottom-0 w-full z-50 border-t border-slate-700/50 rounded-t-2xl shadow-[0_-4px_12px_rgba(0,0,0,0.5)] fixed bottom-0 left-0 w-full flex justify-around items-center px-4 py-3 pb-safe"
    >
      <a
        class="flex flex-col items-center justify-center text-[#2CA4AB] bg-[#2CA4AB]/10 rounded-xl px-4 py-2 hover:bg-slate-800/50 hover:text-teal-400 Active: scale-90 transition-transform duration-150"
        href="#"
      >
        <span class="material-symbols-outlined mb-1" data-icon="quiz">quiz</span>
        <span class="font-inter text-[10px] font-semibold uppercase tracking-wider">Quiz</span>
      </a>
      <a
        class="flex flex-col items-center justify-center text-slate-500 hover:bg-slate-800/50 hover:text-teal-400 Active: scale-90 transition-transform duration-150"
        href="#"
      >
        <span class="material-symbols-outlined mb-1" data-icon="leaderboard">leaderboard</span>
        <span class="font-inter text-[10px] font-semibold uppercase tracking-wider">Rankings</span>
      </a>
      <a
        class="flex flex-col items-center justify-center text-slate-500 hover:bg-slate-800/50 hover:text-teal-400 Active: scale-90 transition-transform duration-150"
        href="#"
      >
        <span class="material-symbols-outlined mb-1" data-icon="person">person</span>
        <span class="font-inter text-[10px] font-semibold uppercase tracking-wider">Profile</span>
      </a>
    </nav>
  </body>
</html>
